# PuppyPi Robot Configuration
# HiWonder Quadruped Robot

name: puppypi
alias: puppy
type: real
prompts: |
  PuppyPi is a quadruped robot from HiWonder.

  ## Movement Control — verified velocity topic
  The verified way to move this connected PuppyPi through ROS MCP is publishing
  puppy_control_msgs/msg/Velocity on /puppy_control/velocity, followed by an
  all-zero stop message.

  ### Move a distance (forward / backward)
  - Topic: /puppy_control/velocity
  - Type: puppy_control_msgs/msg/Velocity
  - Forward example: {"x": 5.0, "y": 0.0, "yaw_rate": 0.0}
  - Publish for a bounded duration, then publish {"x": 0.0, "y": 0.0, "yaw_rate": 0.0}
  - x: 5.0 for 0.8 seconds was verified to move the dog forward.
  - x: 0.15 was too small and made the dog trot in place.

  ### Rotate
  - Rotation is not yet verified. /puppy/rotate_angle exists as an action, but
    action movement through MCP timed out during testing.

  ## Important Topics (read-only / diagnostics)
  - /joint_states - Robot joint positions
  - /image_raw - Camera feed when the camera node is running
  - /puppy_control/velocity - Low-level velocity fallback
  - /puppy_control/velocity_move - Low-level velocity fallback

  ## Other Services
  - /puppy_control/go_home - Return to home position (std_srvs/srv/Empty)
  - /puppy_control/set_running - Enable/disable robot (std_srvs/srv/SetBool)
  - /puppy_control/set_self_balancing - Enable/disable self-balancing (std_srvs/srv/SetBool)
  - /puppy_control/runActionGroup - Run predefined action (puppy_control_msgs/srv/SetRunActionName)

  ## Camera
  - Camera topic: /image_raw

  ## Velocity fallback
  - Hiwonder's ROS 2 docs demonstrate forward walking on /puppy_control/velocity
    with puppy_control_msgs/msg/Velocity and x: 5.0, y: 0.0, yaw_rate: 0.0.
  - Always send an all-zero velocity stop after any velocity movement.
  - Very small values such as x: 0.15 may make the dog trot in place rather
    than translate.

  ## Unverified actions
  - /puppy/move_distance, /puppy/rotate_angle, and /puppy/move_to_pose were
    present in the live graph, but /puppy/move_distance did not move the dog
    through ROS MCP and timed out waiting for a result.
